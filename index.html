                            await signInAnonymously(auth);
                        } catch (fallbackError) {
                            console.error("Fallback auth failed:", fallbackError);
                        }
                    }
                };

                initAuth();

                const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });

                return () => unsubscribe();
            }, [isSdkLoaded]);

            React.useEffect(() => {
                if (!db || !user) return;
                
                const { collection, onSnapshot, doc } = window.FirebaseSetup;

                const unsubOrders = onSnapshot(
                    collection(db, 'artifacts', appId, 'public', 'data', 'orders'), 
                    (snap) => {
                        const data = [];
                        snap.forEach(d => data.push({ id: d.id, ...d.data() }));
                        setOrders(data);
                    }, 
                    (err) => console.error("Orders Error:", err)
                );

                const unsubBatter = onSnapshot(
                    doc(db, 'artifacts', appId, 'public', 'data', 'batter_inventory', selectedDate),
                    (docSnap) => {
                        if (docSnap.exists()) {
                            setBatterLogs(docSnap.data().logs || []);
                        } else {
                            setBatterLogs([]);
                        }
                    },
                    (err) => console.error("Batter Log Error:", err)
                );

                const unsubStock = onSnapshot(
                    doc(db, 'artifacts', appId, 'public', 'data', 'raw_material_stock', 'current'), 
                    (d) => {
                        if (d.exists()) {
                            setRawStock(d.data().stock || {});
                            setManualLogs(d.data().history || []);
                        } else {
                            const initialStock = {};
                            INVENTORY_KEYS.forEach(i => initialStock[i.key] = 0);
                            setRawStock(initialStock);
                            setManualLogs([]);
                        }
                    }, 
                    (err) => console.error("Stock Error:", err)
                );

                return () => { unsubOrders(); unsubBatter(); unsubStock(); };
            }, [db, user, selectedDate]);

            const scrollToTab = (index) => {
                setActiveTab(index);
                if (containerRef.current) {
                    const width = containerRef.current.offsetWidth;
                    containerRef.current.scrollTo({ left: width * index, behavior: 'smooth' });
                }
            };

            const addToCart = (item) => {
                let nameWithSuffix = item.name;
                if (item.category === 'Waffle') {
                    nameWithSuffix = `${item.name} (Waffle)`;
                } else if (item.category === 'Popsicle') {
                    nameWithSuffix = `${item.name} (Popsicle)`;
                } else if (item.category === 'Pancake') {
                    nameWithSuffix = `${item.name} (Pancake)`;
                }

                setCart([...cart, { ...item, name: nameWithSuffix, cartId: Math.random().toString() }]);
            };

            const removeFromCart = (cartId) => {
                setCart(cart.filter(item => item.cartId !== cartId));
                if (cart.length === 1) setIsCartOpen(false);
            };

            const checkout = async (paymentMode) => {
                if (!user || !db || cart.length === 0) return;
                const { collection, addDoc } = window.FirebaseSetup;

                const newOrder = {
                    items: cart,
                    total: cart.reduce((sum, i) => sum + i.price, 0),
                    totalBatter: cart.reduce((sum, i) => sum + i.batter, 0),
                    paymentMode: paymentMode,
                    status: 'making',
                    date: todayStr,
                    timestamp: new Date().toISOString()
                };

                try {
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), newOrder);
                    setCart([]);
                    setIsCartOpen(false);
                    scrollToTab(4); 
                } catch (error) {
                    console.error(error);
                }
            };

            const settlePayment = async (orderId, mode) => {
                if (!user || !db) return;
                const { doc, updateDoc } = window.FirebaseSetup;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', orderId), { paymentMode: mode });
                } catch (error) {
                    console.error(error);
                }
            };

            const completeOrder = async (order) => {
                if (!user || !db) return;
                const { doc, updateDoc, setDoc } = window.FirebaseSetup;
                
                const updatedStock = { ...rawStock };
                order.items.forEach(item => {
                    const baseId = item.id;
                    const recipe = INGREDIENT_RECIPES[baseId];
                    if (recipe) {
                        Object.keys(recipe).forEach(ingredientKey => {
                            const currentVal = updatedStock[ingredientKey] || 0;
                            updatedStock[ingredientKey] = Math.max(0, currentVal - recipe[ingredientKey]);
                        });
                    }
                });

                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'raw_material_stock', 'current'), {
                        stock: updatedStock,
                        history: manualLogs
                    }, { merge: true });

                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', order.id), { status: 'completed' });
                } catch (error) {
                    console.error("Order completion flow exception:", error);
                }
            };

            const removeItemFromOrder = async (order, itemToRemove) => {
                if (!db || !user) return;
                const { doc, updateDoc, setDoc } = window.FirebaseSetup;
                const currentItems = order.items || [];
                const updatedItems = currentItems.filter(i => i.cartId !== itemToRemove.cartId);
                const updatedTotal = updatedItems.reduce((acc, i) => acc + i.price, 0);

                if (order.status === 'completed') {
                    const baseId = itemToRemove.id;
                    const recipe = INGREDIENT_RECIPES[baseId];
                    if (recipe) {
                        const restoredStock = { ...rawStock };
                        Object.keys(recipe).forEach(key => {
                            restoredStock[key] = (restoredStock[key] || 0) + recipe[key];
                        });
                        await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'raw_material_stock', 'current'), { stock: restoredStock }, { merge: true });
                    }
                }

                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', order.id), {
                    items: updatedItems,
                    total: updatedTotal
                });
            };

            const handleOrderCancellation = async () => {
                if (!user || !db || !orderToDelete) return;
                if (deletePinInput !== '4567') {
                    setDeletePinError('Incorrect Password');
                    return;
                }

                const { doc, setDoc, deleteDoc } = window.FirebaseSetup;
                const targetOrder = orderToDelete;

                const updatedStock = { ...rawStock };
                
                if (targetOrder.status === 'completed') {
                    targetOrder.items.forEach(item => {
                        const baseId = item.id;
                        const recipe = INGREDIENT_RECIPES[baseId];
                        if (recipe) {
                            Object.keys(recipe).forEach(ingredientKey => {
                                const currentVal = updatedStock[ingredientKey] || 0;
                                updatedStock[ingredientKey] = currentVal + recipe[ingredientKey];
                            });
                        }
                    });
                }

                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'raw_material_stock', 'current'), {
                        stock: updatedStock,
                        history: [`Reverted cancelled items from order timestamped ${new Date(targetOrder.timestamp).toLocaleTimeString()}`, ...manualLogs].slice(0, 40)
                    }, { merge: true });

                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', targetOrder.id));

                    setOrderToDelete(null);
                    setDeletePinInput('');
                    setDeletePinError('');
                } catch (error) {
                    console.error("Cancellation flow exception:", error);
                    setDeletePinError('Error processing cancel request.');
                }
            };

            const addBatterVolume = async () => {
                if (!user || !db || !batterInput) return;
                if (isHistoricalSelected && !isAdminMode) return;

                const { doc, setDoc } = window.FirebaseSetup;
                const addedValue = Number(batterInput);
                const updatedLogs = [...batterLogs, addedValue];

                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'batter_inventory', selectedDate), {
                        logs: updatedLogs
                    });
                    setBatterInput('');
                } catch (err) {
                    console.error(err);
                }
            };

            const updateIngredientStock = async (key, absoluteValue) => {
                if (!user || !db) return;
                const { doc, setDoc } = window.FirebaseSetup;
                
                const newStock = { ...rawStock, [key]: Number(absoluteValue) };
                const timestampString = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
                const newLogItem = `Updated ${INVENTORY_KEYS.find(i=>i.key===key)?.label || key} to ${absoluteValue} on ${timestampString}`;
                const updatedLogs = [newLogItem, ...manualLogs].slice(0, 40);

                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'raw_material_stock', 'current'), {
                        stock: newStock,
                        history: updatedLogs
                    });
                } catch (err) {
                    console.error(err);
                }
            };

            // Aggregated values
            const filteredOrders = orders.filter(o => o.date === selectedDate);
            const activeMakingOrders = orders.filter(o => o.status === 'making').sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
            const completedOrders = filteredOrders.filter(o => o.status === 'completed');

            const cashRevenue = completedOrders.filter(o => o.paymentMode === 'Cash').reduce((sum, o) => sum + o.total, 0);
            const gpayRevenue = completedOrders.filter(o => o.paymentMode === 'GPay').reduce((sum, o) => sum + o.total, 0);
            const totalRevenue = cashRevenue + gpayRevenue;

            const totalBatterMade = batterLogs.reduce((sum, val) => sum + val, 0);
            const totalBatterUsed = filteredOrders.reduce((sum, order) => sum + order.totalBatter, 0);

            // Item categories count
            let totalWafflesCount = 0;
            let totalPopsiclesCount = 0;
            let totalPancakePiecesCount = 0;

            completedOrders.forEach(order => {
                order.items.forEach(item => {
                    if (item.id.startsWith('w') || item.name.includes('(Waffle)')) totalWafflesCount += 1;
                    if (item.id.startsWith('po') || item.name.includes('(Popsicle)')) totalPopsiclesCount += 1;
                    if (item.id.startsWith('p') || item.name.includes('(Pancake)')) {
                        if (item.id.includes('12pc')) totalPancakePiecesCount += 12;
                        else if (item.id.includes('6pc')) totalPancakePiecesCount += 6;
                        else totalPancakePiecesCount += 6; 
                    }
                    if (item.category === 'Others') {
                        if (item.name.toLowerCase().includes('waffle')) totalWafflesCount += (item.id === 'c1' || item.id === 'c3' || item.id === 'c5') ? 2 : 1;
                        if (item.name.toLowerCase().includes('popsicle')) totalPopsiclesCount += 1;
                        if (item.name.toLowerCase().includes('pancake')) totalPancakePiecesCount += 12; 
                    }
                });
            });

            const itemBreakdown = {};
            completedOrders.forEach(order => {
                order.items.forEach(item => {
                    itemBreakdown[item.name] = (itemBreakdown[item.name] || 0) + 1;
                });
            });

            const pancakeMenuGroups = {};
            MENU_ITEMS.filter(item => item.category === 'Pancake').forEach(item => {
                const baseName = item.name.replace(/\s*\((6pc|12pc)\)/i, '').trim();
                if (!pancakeMenuGroups[baseName]) {
                    pancakeMenuGroups[baseName] = [];
                }
                pancakeMenuGroups[baseName].push(item);
            });

            if (!isSdkLoaded) {
                return (
                    <div className="flex flex-col justify-center items-center h-screen bg-gray-50 text-gray-500 font-semibold">
                        <i className="fas fa-circle-notch fa-spin text-3xl mb-4 text-amber-600"></i>
                        <p className="text-sm">Loading System Engines...</p>
                    </div>
                );
            }

            return (
                <div className="h-screen w-full flex flex-col bg-brand-light">
                    {/* Header */}
                    <header className="bg-brand text-brand-dark p-4 shadow-md z-10 flex justify-between items-center shrink-0">
                        <div className="flex items-center gap-2">
                            <span className="text-2xl">🧇</span>
                            <h1 className="text-xl font-extrabold tracking-wider uppercase">THEWAFFLEPOP_CO</h1>
                        </div>
                        
                        {(activeTab >= 5) && (
                            <div className="flex items-center gap-2">
                                {isHistoricalSelected && !isAdminMode && (
                                    <button 
                                        onClick={() => setShowAdminPinModal(true)}
                                        className="bg-red-600 text-white text-xs px-2.5 py-1 rounded font-bold animate-pulse flex items-center gap-1 shadow-sm active:scale-95"
                                    >
                                        <i className="fas fa-lock"></i> Locked Log
                                    </button>
                                )}
                                <input 
                                    type="date" 
                                    value={selectedDate}
                                    onChange={(e) => {
                                        setSelectedDate(e.target.value);
                                        setIsAdminMode(false);
                                    }}
                                    className="bg-white/80 border border-brand-dark/20 text-brand-dark rounded px-2 py-1 text-sm font-semibold outline-none"
                                />
                            </div>
                        )}
                    </header>

                    {/* Navigation Tabs */}
                    <nav className="bg-white shadow-sm flex overflow-x-auto hide-scrollbar shrink-0">
                        {TABS.map((tab, idx) => (
                            <button 
                                key={tab}
                                onClick={() => scrollToTab(idx)}
                                className={`px-5 py-3 whitespace-nowrap font-bold border-b-4 transition-colors ${activeTab === idx ? 'border-brand text-brand-dark' : 'border-transparent text-gray-400 hover:text-brand-accent'}`}
                            >
                                {tab}
                                {tab === 'Making Orders' && activeMakingOrders.length > 0 && (
                                    <span className="ml-2 bg-red-500 text-white rounded-full text-xs px-2 py-0.5 animate-pulse">
                                        {activeMakingOrders.length}
                                    </span>
                                )}
                            </button>
                        ))}
                    </nav>

                    {/* Main Workspace Frame */}
                    <main ref={containerRef} onScroll={(e) => {
                        if (!containerRef.current) return;
                        const idx = Math.round(e.target.scrollLeft / e.target.offsetWidth);
                        if (idx !== activeTab && idx >= 0 && idx < TABS.length) setActiveTab(idx);
                    }} className="flex-1 flex overflow-x-auto snap-x-mandatory hide-scrollbar animate-[fadeIn_0.2s_ease-out]">
                        
                        {/* Waffles Tab */}
                        <div className="min-w-full h-full p-4 snap-center-item overflow-y-auto pb-24">
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                {MENU_ITEMS.filter(item => item.category === 'Waffle').map(item => (
                                    <div 
                                        key={item.id} 
                                        onClick={() => addToCart(item)}
                                        className="bg-white p-4 rounded-2xl shadow-sm hover:shadow-md hover:scale-[1.02] transition-all cursor-pointer border border-brand-light flex flex-col items-center text-center active:scale-95"
                                    >
                                        <div className="mb-2"><RenderItemIcon name={item.name} category="Waffle" /></div>
                                        <h3 className="font-bold text-gray-800 text-sm mb-1">{item.name}</h3>
                                        <p className="text-brand-accent font-bold mt-auto">₹{item.price}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Popsicles Tab */}
                        <div className="min-w-full h-full p-4 snap-center-item overflow-y-auto pb-24">
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                {MENU_ITEMS.filter(item => item.category === 'Popsicle').map(item => (
                                    <div 
                                        key={item.id} 
                                        onClick={() => addToCart(item)}
                                        className="bg-white p-4 rounded-2xl shadow-sm hover:shadow-md hover:scale-[1.02] transition-all cursor-pointer border border-brand-light flex flex-col items-center text-center active:scale-95"
                                    >
                                        <div className="mb-2"><RenderItemIcon name={item.name} category="Popsicle" /></div>
                                        <h3 className="font-bold text-gray-800 text-sm mb-1">{item.name}</h3>
                                        <p className="text-brand-accent font-bold mt-auto">₹{item.price}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Pancakes Tab */}
                        <div className="min-w-full h-full p-4 snap-center-item overflow-y-auto pb-24">
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                {Object.entries(pancakeMenuGroups).map(([baseName, options]) => (
                                    <div 
                                        key={baseName} 
                                        onClick={() => setPancakePopupGroup({ baseName, options })}
                                        className="bg-white p-4 rounded-2xl shadow-sm hover:shadow-md hover:scale-[1.02] transition-all cursor-pointer border border-brand-light flex flex-col items-center text-center active:scale-95"
                                    >
                                        <div className="mb-2"><VectorPancake /></div>
                                        <h3 className="font-bold text-gray-800 text-sm mb-1">{baseName}</h3>
                                        <p className="text-brand-accent font-bold mt-auto">₹{options[0]?.price} - ₹{options[1]?.price || options[0]?.price}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Others Tab */}
                        <div className="min-w-full h-full p-4 snap-center-item overflow-y-auto pb-24">
                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                                {MENU_ITEMS.filter(item => item.category === 'Others').map(item => (
                                    <div 
                                        key={item.id} 
                                        onClick={() => addToCart(item)}
                                        className="bg-white p-4 rounded-2xl shadow-sm hover:shadow-md hover:scale-[1.02] transition-all cursor-pointer border border-brand-light flex flex-col items-center text-center active:scale-95"
                                    >
                                        <div className="text-4xl mb-2">{item.emoji}</div>
                                        <h3 className="font-bold text-gray-800 text-sm mb-1">{item.name}</h3>
                                        <p className="text-brand-accent font-bold mt-auto">₹{item.price}</p>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Tab 4: Active Kitchen Queue */}
                        <div className="min-w-full h-full p-4 snap-center-item overflow-y-auto pb-24">
                            <h2 className="text-2xl font-black text-brand-dark mb-4 border-b-2 border-brand pb-2 flex items-center gap-2">
                                <i className="fas fa-utensils"></i> Current Live Orders
                            </h2>
                            {activeMakingOrders.length === 0 ? (
                                <div className="flex flex-col items-center justify-center h-64 text-gray-400">
                                    <span className="text-5xl mb-2">🍽️</span>
                                    <p className="italic">Kitchen is clear. Waiting for incoming tickets.</p>
                                </div>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {activeMakingOrders.map((order, idx) => {
                                        const isPending = order.paymentMode === 'Pending';
                                        return (
                                            <div key={order.id} className="bg-white p-5 rounded-2xl shadow-sm border border-brand-light flex flex-col justify-between">
                                                <div>
                                                    <div className="flex justify-between items-center mb-2">
                                                        <span className="text-xs bg-brand-light text-brand-dark px-2.5 py-1 rounded-full font-black">Ticket #{idx+1}</span>
                                                        <button 
                                                            onClick={() => setOrderToDelete(order)}
                                                            className="text-red-500 hover:text-red-700 p-1 text-xs font-bold flex items-center gap-1 active:scale-90 transition-transform"
                                                        >
                                                            <i className="fas fa-trash-alt"></i> Cancel
                                                        </button>
                                                    </div>
                                                    <div className="space-y-1.5 my-3 border-b border-gray-100 pb-2">
                                                        {order.items && order.items.map((it, i) => (
                                                            <div key={it.cartId || i} className="flex justify-between items-center text-sm font-semibold text-gray-700">
                                                                <span className="flex items-center gap-1">
                                                                    {it.emoji && it.emoji.trim() === '🥞' ? '🥞' : ''} {it.name}
                                                                </span>
                                                                <div className="flex items-center gap-2">
                                                                    <span>₹{it.price}</span>
                                                                    <button 
                                                                        onClick={() => removeItemFromOrder(order, it)}
                                                                        className="text-red-400 hover:text-red-600 p-0.5 text-xs transition-colors"
                                                                        title="Remove specific item"
                                                                    >
                                                                        <i className="fas fa-minus-circle"></i>
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                    <div className="flex justify-between items-center font-black text-brand-dark">
                                                        <span className="text-xs uppercase text-gray-400">Bill Total</span>
                                                        <span>₹{order.total}</span>
                                                    </div>
                                                </div>

                                                <div className="mt-4 pt-3 border-t border-gray-100 space-y-2">
                                                    <div className="flex items-center justify-between text-xs font-bold uppercase mb-1">
                                                        <span className="text-gray-400">Payment Status:</span>
                                                        <span className={`px-2 py-0.5 rounded ${isPending ? 'bg-red-100 text-red-700 animate-pulse font-black' : 'bg-gray-100 text-gray-700'}`}>{order.paymentMode}</span>
                                                    </div>

                                                    {isPending ? (
                                                        <div className="grid grid-cols-2 gap-2">
                                                            <button onClick={() => settlePayment(order.id, 'Cash')} className="bg-green-100 text-green-700 py-2 rounded-xl text-xs font-bold shadow-sm hover:bg-green-200"><i className="fas fa-money-bill-wave"></i> Settle Cash</button>
                                                            <button onClick={() => settlePayment(order.id, 'GPay')} className="bg-blue-100 text-blue-700 py-2 rounded-xl text-xs font-bold shadow-sm hover:bg-blue-200"><i className="fab fa-google-pay"></i> Settle GPay</button>
                                                        </div>
                                                    ) : (
                                                        <button 
                                                            onClick={() => completeOrder(order)} 
                                                            className="w-full bg-brand text-brand-dark font-black py-2.5 rounded-xl text-sm shadow hover:bg-brand-accent hover:text-white transition-all"
                                                        >
                                                            <i className="fas fa-check-circle"></i> Complete Order
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>

                        {/* Tab 5: Order History Logs */}
                        <div className="min-w-full h-full p-4 snap-center-item overflow-y-auto pb-24">
                            <h2 className="text-2xl font-black text-brand-dark mb-4 border-b-2 border-brand pb-2">Completed Logs</h2>
                            {completedOrders.length === 0 ? (
                                <p className="text-gray-500 italic">No historical orders tracked for {selectedDate}.</p>
                            ) : (
                                <div className="space-y-2">
                                    {completedOrders.map((order, i) => (
                                        <div key={order.id} className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                            <div className="flex justify-between items-center">
                                                <div>
                                                    <p className="text-xs text-gray-400 font-bold">#{i+1} • {new Date(order.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                                                    <p className="text-sm font-semibold text-gray-700">{order.items ? order.items.map(it => it.name).join(', ') : 'No items'}</p>
                                                </div>
                                                <div className="flex items-center gap-4 shrink-0">
                                                    <div className="text-right">
                                                        <p className="font-black text-brand-dark">₹{order.total}</p>
                                                        <span className="text-[10px] bg-gray-100 text-gray-600 font-bold uppercase px-2 py-0.5 rounded">{order.paymentMode}</span>
                                                    </div>
                                                    <button 
                                                        onClick={() => setOrderToDelete(order)}
                                                        className="bg-red-50 text-red-600 hover:bg-red-100 p-2.5 rounded-xl transition-colors active:scale-90"
                                                        title="Cancel Order and Restore Raw Stock"
                                                    >
                                                        <i className="fas fa-undo-alt"></i>
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            {/* Itemized removal from already Completed logs */}
                                            {order.items && order.items.length > 1 && (
                                                <div className="mt-2 pt-2 border-t border-gray-50 space-y-1">
                                                    <p className="text-[10px] text-gray-400 font-bold uppercase">Click Item to Revert Separately:</p>
                                                    <div className="flex flex-wrap gap-1.5">
                                                        {order.items.map(item => (
                                                            <button 
                                                                key={item.cartId} 
                                                                onClick={() => {
                                                                    if (confirm(`Remove "${item.name}" and restore stock?`)) {
                                                                        removeItemFromOrder(order, item);
                                                                    }
                                                                }}
                                                                className="text-xs bg-gray-100 hover:bg-red-50 hover:text-red-600 text-gray-600 px-2 py-1 rounded border transition-colors flex items-center gap-1"
                                                            >
                                                                {item.name} <i className="fas fa-times-circle text-[10px]"></i>
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Tab 6: Public Inventory and Sales Metrics (Unlocked) */}
                        <div className="min-w-full h-full p-4 snap-center-item overflow-y-auto pb-24">
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* Accounting Ledger */}
                                <div className="bg-brand-dark text-white p-5 rounded-2xl shadow-lg">
                                    <h4 className="text-xs uppercase font-bold text-brand tracking-wider mb-2">Accounting Ledger ({selectedDate})</h4>
                                    <div className="text-3xl font-black mb-3">₹{totalRevenue}</div>
                                    <div className="grid grid-cols-2 gap-2 border-t border-white/10 pt-3 text-xs">
                                        <div>
                                            <p className="opacity-60 font-semibold">💵 Cash Sales</p>
                                            <p className="text-base font-bold text-green-300">₹{cashRevenue}</p>
                                        </div>
                                        <div>
                                            <p className="opacity-60 font-semibold">📱 GPay Sales</p>
                                            <p className="text-base font-bold text-blue-300">₹{gpayRevenue}</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Volume Metrics */}
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-brand-light">
                                    <h4 className="text-xs uppercase font-bold text-gray-400 tracking-wider mb-3">Volume Metrics Sold</h4>
                                    <div className="space-y-2 text-sm font-semibold">
                                        <div className="flex justify-between border-b pb-1">
                                            <span className="text-gray-600">🧇 Total Waffles Sold</span>
                                            <span className="text-brand-dark font-black">{totalWafflesCount} Units</span>
                                        </div>
                                        <div className="flex justify-between border-b pb-1">
                                            <span className="text-gray-600">🍦 Total Popsicles Sold</span>
                                            <span className="text-brand-dark font-black">{totalPopsiclesCount} Units</span>
                                        </div>
                                        <div className="flex justify-between pb-1">
                                            <span className="text-gray-600">🥞 Total Pancake Pieces Sold</span>
                                            <span className="text-brand-dark font-black">{totalPancakePiecesCount} Pcs</span>
                                        </div>
                                    </div>
                                </div>

                                {/* Batter Tracker */}
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-brand-light">
                                    <h4 className="text-xs uppercase font-bold text-brand-dark mb-2 flex justify-between items-center">
                                        <span>🔋 Batter Tracking</span>
                                        <span className="text-[10px] text-gray-400 font-mono font-bold">Today</span>
                                    </h4>
                                    
                                    <div className="bg-gray-50 rounded-xl p-3 mb-3 text-center border">
                                        <p className="text-xs font-bold text-gray-400 uppercase">Batter Mixed Today (Grams)</p>
                                        <p className="text-sm font-mono font-black text-gray-700 my-1">
                                            {batterLogs.length === 0 ? '0' : batterLogs.join(' + ')}
                                        </p>
                                        <p className="text-2xl font-black text-brand-accent">Total: {totalBatterMade}g</p>
                                    </div>

                                    <div className="flex gap-2 mb-4">
                                        <input 
                                            type="number"
                                            placeholder="Add grams"
                                            value={batterInput}
                                            onChange={(e) => setBatterInput(e.target.value)}
                                            disabled={isHistoricalSelected && !isAdminMode}
                                            className="flex-1 min-w-0 border rounded-lg px-2 text-sm font-bold bg-white outline-none disabled:bg-gray-100"
                                        />
                                        <button 
                                            onClick={addBatterVolume}
                                            disabled={isHistoricalSelected && !isAdminMode}
                                            className="bg-brand text-brand-dark font-black px-4 py-1.5 rounded-lg text-xs shrink-0 disabled:opacity-40"
                                        >
                                            + Add
                                        </button>
                                    </div>

                                    <div className="flex justify-between text-xs font-bold text-gray-500 border-t pt-2">
                                        <span>Used: <span className="text-orange-600">{totalBatterUsed}g</span></span>
                                        <span>Remaining: <span className="text-green-600">{Math.max(0, totalBatterMade - totalBatterUsed)}g</span></span>
                                    </div>
                                </div>

                                {/* Itemized Sold Breakup Section */}
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-brand-light md:col-span-3">
                                    <h4 className="text-sm uppercase font-black text-brand-dark mb-3 tracking-wider flex items-center gap-2">
                                        <i className="fas fa-chart-pie"></i> Today's Item Breakup (Sold)
                                    </h4>
                                    {Object.keys(itemBreakdown).length === 0 ? (
                                        <p className="text-sm text-gray-400 italic">No items sold yet today.</p>
                                    ) : (
                                        <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
                                            {Object.entries(itemBreakdown).sort((a,b)=>b[1]-a[1]).map(([name, qty]) => (
                                                <div key={name} className="flex justify-between items-center bg-gray-50 p-3 rounded-xl border border-gray-100">
                                                    <span className="text-sm font-semibold text-gray-700">{name}</span>
                                                    <span className="bg-brand text-brand-dark px-2.5 py-0.5 rounded-full text-xs font-black">x{qty}</span>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* Tab 7: Centralized Secured Raw Stock Matrix (Locked) */}
                        <div className="min-w-full h-full p-4 snap-center-item overflow-y-auto pb-24">
                            {!rawStockUnlocked ? (
                                <div className="max-w-md mx-auto mt-12 bg-white p-6 rounded-2xl shadow-md border border-brand-light text-center">
                                    <span className="text-4xl mb-2 block">🔒</span>
                                    <h3 className="text-lg font-black mb-4">Raw Ingredient Balances Protection</h3>
                                    <input 
                                        type="password" 
                                        placeholder="Enter PIN to Access Stock"
                                        value={passwordInput}
                                        onChange={(e) => {
                                            setPasswordInput(e.target.value);
                                            setRawStockPinError('');
                                        }}
                                        className="w-full text-center border-2 border-brand rounded-xl p-2.5 font-bold mb-4 outline-none"
                                    />
                                    {rawStockPinError && (
                                        <p className="text-xs text-red-500 font-bold mb-3">{rawStockPinError}</p>
                                    )}
                                    <button 
                                        onClick={() => {
                                            if (passwordInput === '4567') {
                                                setRawStockUnlocked(true);
                                                setPasswordInput('');
                                            } else {
                                                setRawStockPinError('Incorrect PIN. Please try again.');
                                            }
                                        }}
                                        className="w-full bg-brand-dark text-white p-3 rounded-xl font-bold hover:bg-brand transition-colors"
                                    >
                                        Unlock Stock Ledger
                                    </button>
                                </div>
                            ) : (
                                <div className="bg-white p-5 rounded-2xl shadow-sm border border-brand-light flex flex-col h-[70vh]">
                                    <h3 className="text-sm uppercase font-black text-brand-dark mb-3 tracking-widest flex justify-between items-center">
                                        <span>📦 Live Raw Ingredient Balances</span>
                                        <span className="text-xs font-medium text-emerald-600 lowercase bg-emerald-50 px-2 py-0.5 rounded font-black">Auto-deductions enabled</span>
                                    </h3>

                                    {/* Material Rows Grid */}
                                    <div className="flex-1 overflow-y-auto space-y-2 pr-1">
                                        {INVENTORY_KEYS.map(item => (
                                            <div key={item.key} className="flex justify-between items-center bg-gray-50 p-2.5 rounded-xl border border-gray-100 hover:bg-gray-100/70 transition-colors">
                                                <span className="text-sm font-semibold text-gray-700">{item.label}</span>
                                                <div className="flex items-center gap-2">
                                                    <input 
                                                        type="number" 
                                                        value={rawStock[item.key] !== undefined ? rawStock[item.key] : ''}
                                                        onChange={(e) => updateIngredientStock(item.key, e.target.value)}
                                                        placeholder="0"
                                                        className="w-24 text-right bg-white font-black text-brand-dark border border-gray-200 rounded-lg p-1 text-sm outline-none focus:border-brand"
                                                    />
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Audit Logs Trail View */}
                                    <div className="mt-4 pt-3 border-t h-32 overflow-y-auto text-[10px] text-gray-400 font-mono space-y-1">
                                        <p className="font-bold text-gray-500 uppercase tracking-wider sticky top-0 bg-white pb-1">Activity Log Trail</p>
                                        {manualLogs.length === 0 ? (
                                            <p className="italic">No ingredient modification logs captured.</p>
                                        ) : (
                                            manualLogs.map((log, i) => <p key={i} className="border-b border-gray-50 py-0.5">⏱️ {log}</p>)
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>

                    {/* Pancake Quantity Selector Popup */}
                    {pancakePopupGroup && (
                        <div className="absolute inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm text-center animate-[zoomIn_0.15s_ease-out]">
                                <div className="mb-3"><VectorPancake /></div>
                                <h3 className="text-lg font-black mb-1">{pancakePopupGroup.baseName}</h3>
                                <p className="text-xs text-gray-400 mb-6 font-semibold">Select pancake portion size</p>
                                
                                <div className="space-y-3">
                                    {pancakePopupGroup.options.map(option => (
                                        <button 
                                            key={option.id}
                                            onClick={() => {
                                                addToCart(option);
                                                setPancakePopupGroup(null);
                                            }}
                                            className="w-full bg-brand-light hover:bg-brand text-brand-dark p-4 rounded-xl font-extrabold flex justify-between items-center transition-all shadow-sm active:scale-95"
                                        >
                                            <span>{option.name.includes('12pc') ? '12 Pieces (12pc)' : '6 Pieces (6pc)'}</span>
                                            <span>₹{option.price}</span>
                                        </button>
                                    ))}
                                </div>
                                <button 
                                    onClick={() => setPancakePopupGroup(null)}
                                    className="mt-5 w-full bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-2.5 rounded-xl text-sm"
                                >
                                    Cancel
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Custom Admin Lock Override PIN Modal */}
                    {showAdminPinModal && (
                        <div className="absolute inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm text-center">
                                <span className="text-4xl mb-2 block">🔑</span>
                                <h3 className="text-lg font-black mb-1">Admin Lock Override</h3>
                                <p className="text-xs text-gray-400 mb-6 font-semibold">Enter your password to modify historical records.</p>
                                
                                <input 
                                    type="password" 
                                    placeholder="Enter Admin PIN"
                                    value={adminPinInput}
                                    onChange={(e) => {
                                        setAdminPinInput(e.target.value);
                                        setAdminPinError('');
                                    }}
                                    className="w-full text-center border-2 border-brand rounded-xl p-2.5 font-bold mb-2 outline-none focus:border-brand-accent"
                                />
                                {adminPinError && (
                                    <p className="text-xs text-red-500 font-bold mb-3">{adminPinError}</p>
                                )}
                                
                                <div className="grid grid-cols-2 gap-2 mt-4">
                                    <button 
                                        onClick={() => {
                                            if (adminPinInput === '4567') {
                                                setIsAdminMode(true);
                                                setShowAdminPinModal(false);
                                                setAdminPinInput('');
                                            } else {
                                                setAdminPinError('Invalid Password');
                                            }
                                        }}
                                        className="bg-brand-dark text-white p-3 rounded-xl font-bold hover:bg-brand transition-colors active:scale-95"
                                    >
                                        Unlock
                                    </button>
                                    <button 
                                        onClick={() => {
                                            setShowAdminPinModal(false);
                                            setAdminPinInput('');
                                            setAdminPinError('');
                                        }}
                                        className="bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 rounded-xl text-sm"
                                    >
                                        Cancel
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Admin Order Deletion & Inventory Reversion Confirmation PIN Modal */}
                    {orderToDelete && (
                        <div className="absolute inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
                            <div className="bg-white p-6 rounded-2xl shadow-xl w-full max-w-sm text-center">
                                <span className="text-4xl mb-2 block">🗑️</span>
                                <h3 className="text-lg font-black mb-1">Cancel Order</h3>
                                <p className="text-xs text-gray-500 mb-4 font-semibold px-2">
                                    Are you sure you want to completely delete this order of ₹{orderToDelete.total}? All deducted raw ingredients and batter totals will be automatically restored to your stock counts.
                                </p>
                                
                                <input 
                                    type="password" 
                                    placeholder="Enter Admin PIN (4567)"
                                    value={deletePinInput}
                                    onChange={(e) => {
                                        setDeletePinInput(e.target.value);
                                        setDeletePinError('');
                                    }}
                                    className="w-full text-center border-2 border-brand rounded-xl p-2.5 font-bold mb-2 outline-none focus:border-brand-accent"
                                />
                                {deletePinError && (
                                    <p className="text-xs text-red-500 font-bold mb-3">{deletePinError}</p>
                                )}
                                
                                <div className="grid grid-cols-2 gap-2 mt-4">
                                    <button 
                                        onClick={handleOrderCancellation}
                                        className="bg-red-600 text-white p-3 rounded-xl font-bold hover:bg-red-700 transition-colors active:scale-95"
                                    >
                                        Confirm Delete
                                    </button>
                                    <button 
                                        onClick={() => {
                                            setOrderToDelete(null);
                                            setDeletePinInput('');
                                            setDeletePinError('');
                                        }}
                                        className="bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold py-3 rounded-xl text-sm"
                                    >
                                        Abort
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Floating Bill Button */}
                    {cart.length > 0 && activeTab < 4 && !isCartOpen && (
                        <div className="absolute bottom-6 left-0 right-0 flex justify-center z-20">
                            <button 
                                onClick={() => setIsCartOpen(true)}
                                className="bg-brand-dark text-white px-8 py-4 rounded-full font-black shadow-xl hover:scale-105 transition-transform flex items-center gap-3 animate-bounce"
                            >
                                <span className="bg-brand text-brand-dark w-6 h-6 rounded-full flex items-center justify-center text-sm">{cart.length}</span>
                                View Basket • ₹{cart.reduce((s,i)=>s+i.price,0)}
                            </button>
                        </div>
                    )}

                    {/* Modal Cart Drawer Engine */}
                    {isCartOpen && (
                        <div className="absolute inset-0 bg-black/60 z-50 flex flex-col justify-end">
                            <div className="bg-white rounded-t-3xl p-6 h-[80vh] flex flex-col animate-[slideUp_0.3s_ease-out]">
                                <div className="flex justify-between items-center mb-4">
                                    <h2 className="text-2xl font-black">Current Order</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="bg-gray-100 w-10 h-10 rounded-full text-gray-500 font-black hover:bg-gray-200">✕</button>
                                </div>

                                <div className="flex-1 overflow-y-auto space-y-2 mb-4">
                                    {cart.map(item => (
                                        <div key={item.cartId} className="flex justify-between items-center bg-gray-50 p-3 rounded-xl border">
                                            <span className="font-semibold text-sm">{item.emoji && item.emoji.trim() === '🥞' ? '🥞' : ''} {item.name}</span>
                                            <div className="flex items-center gap-3">
                                                <span className="font-black text-brand-dark">₹{item.price}</span>
                                                <button onClick={() => removeFromCart(item.cartId)} className="text-red-400 hover:text-red-600"><i className="fas fa-trash"></i></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <div className="border-t-2 border-dashed border-gray-200 pt-3 mb-4 flex justify-between items-end">
                                    <span className="text-xs text-gray-400 uppercase font-bold">Total</span>
                                    <span className="text-3xl font-black text-brand-dark">₹{cart.reduce((s,i)=>s+i.price,0)}</span>
                                </div>

                                <div className="grid grid-cols-3 gap-2">
                                    <button onClick={() => checkout('Cash')} className="bg-green-600 text-white py-3 rounded-xl font-black text-xs flex flex-col items-center justify-center"><i className="fas fa-money-bill-wave mb-1 text-sm"></i> Cash</button>
                                    <button onClick={() => checkout('GPay')} className="bg-blue-600 text-white py-3 rounded-xl font-black text-xs flex flex-col items-center justify-center"><i className="fab fa-google-pay mb-1 text-lg leading-none"></i> GPay</button>
                                    <button onClick={() => checkout('Pending')} className="bg-red-500 text-white py-3 rounded-xl font-black text-xs flex flex-col items-center justify-center"><i className="fas fa-hourglass-half mb-1 text-sm"></i> Pending</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
